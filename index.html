<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HI BABYYYY!! 😋</title>
    <style>
        body { background-color: #ffeef8; font-family: 'Arial', sans-serif; text-align: center; padding: 50px 20px; color: #d63384; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(255, 105, 180, 0.3); border: 2px solid #ffb6c1; display: inline-block; min-width: 300px; }
        .btn-container { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #yesBtn { background-color: #ff69b4; color: white; }
        #noBtn { background-color: #ffb6c1; color: white; }
        img { max-width: 230px; border-radius: 15px; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
        #meme-text { font-weight: bold; margin-top: 15px; font-size: 18px; }
    </style>
</head>
<body>

    <div class="container" id="quiz-box">
        <h1 id="question">Do you love me? 😛💕</h1>
        <img id="meme-pic" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BqZzZ6ZzR6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6Jm09ZWFfbm9uZV9zaGFwZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/V53z6xcL6G27937qTV/giphy.gif">
        <p id="meme-text">Choose wisely... 😊</p>
        
        <div class="btn-container" id="buttons">
            <button id="yesBtn" onclick="handleYes()">Yes!</button>
            <button id="noBtn" onclick="handleNo()">No</button>
        </div>
    </div>

    <script>
        let step = 0;

        // Content for when he clicks YES
        const yesSteps = [
            { q: "Really??", t: "OMG I KNEW IT! 🥰", m: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueGZ3bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZContext&ep=v1_gifs_search&rid=giphy.gif" },
            { q: "Am I the prettiest girl ever? 🎀", t: "Correct answer! ✨", m: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXpueGZ3bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZContext&ep=v1_gifs_search&rid=giphy.gif" },
            { q: "Will you buy me food later? 🍕", t: "Hehe, such a good boy! 😋", m: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNnpueGZ3bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZContext&ep=v1_gifs_search&rid=giphy.gif" }
        ];

        // Content for when he clicks NO
        const noReactions = [
            { t: "wth? misclick?? 🙏🏼🥀", m: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BqZzZ6ZzR6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6Jm09ZWFfbm9uZV9zaGFwZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/V53z6xcL6G27937qTV/giphy.gif" },
            { t: "zhuro misclick lang, ganon? 😊", m: "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyZ253MXF0b2Z6b290ODA2bHR2MzUyb2F6NXBiMHI4YmlibGZmcW9ldyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/AAsj7jdrHjtp6/giphy.gif" }
        ];

        function handleNo() {
            // Change text and meme to a "No" reaction
            const reaction = noReactions[Math.floor(Math.random() * noReactions.length)];
            document.getElementById('meme-text').innerText = reaction.t;
            document.getElementById('meme-pic').src = reaction.m;
            
            // THE TRAP: Turn the No button into a Yes button
            const noBtn = document.getElementById('noBtn');
            noBtn.innerText = "Yes! ❤️";
            noBtn.style.backgroundColor = "#ff69b4";
            noBtn.onclick = handleYes; 
        }

        function handleYes() {
            if (step < yesSteps.length) {
                const current = yesSteps[step];
                document.getElementById('question').innerText = current.q;
                document.getElementById('meme-text').innerText = current.t;
                document.getElementById('meme-pic').src = current.m;
                
                // Reset the No button for the next question
                const noBtn = document.getElementById('noBtn');
                noBtn.innerText = "No";
                noBtn.style.backgroundColor = "#ffb6c1";
                noBtn.onclick = handleNo;

                step++;
            } else {
                // Final Ending
                document.getElementById('quiz-box').innerHTML = `
                    <h1>YAY! I love you most! 💖✨</h1>
                    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExN3pueGZ3bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6bmZ6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZContext&ep=v1_gifs_search&rid=giphy.gif">
                    <p>Mwah! You passed the test! 🥰</p>
                `;
            }
        }
    </script>
</body>
</html>
